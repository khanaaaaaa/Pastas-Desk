<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pasta's Table 🌸</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/wall.css" />
  <link rel="stylesheet" href="css/table.css" />
  <link rel="stylesheet" href="css/basket.css" />
  <link rel="stylesheet" href="css/widgets.css" />
</head>
<body>

  <div id="wall">
    <div class="painting">🌸</div>
    <div class="shelf">
      <span class="shelf-item">🧸</span>
      <span class="shelf-item">🕯️</span>
      <span class="shelf-item">🌷</span>
    </div>
  </div>

  <div id="floor-edge"></div>

  <div id="table">
    <span class="zone-label">✨ your desk</span>
    <div id="widgets-container"></div>
  </div>


  <div id="basket">
    <div id="basket-handle"></div>
    <p class="basket-title">🧺 basket</p>
    <button onclick="spawnPomodoro()">⏱ pomodoro</button>
    <button onclick="spawnNote()">📝 note</button>
    <button onclick="spawnClock()">🕐 clock</button>
    <button onclick="spawnMusic()">🎵 music</button>
    <hr class="basket-divider" />
    <button onclick="toggleTheme()">🌙 theme</button>
    <button onclick="clearTable()">🗑 clear</button>
  </div>

  <script src="javascript/pomodoro.js"></script>
  <script src="javascript/notes.js"></script>
  <script src="javascript/clock.js"></script>
  <script src="javascript/music.js"></script>
</body>
</html>
