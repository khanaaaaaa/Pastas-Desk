<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pasta's Table</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Caveat:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/wall.css" />
  <link rel="stylesheet" href="css/table.css" />
  <link rel="stylesheet" href="css/basket.css" />
  <link rel="stylesheet" href="css/widgets.css" />
</head>
<body>

  <div id="wall">
    <div class="painting" style="display:none">
      <img src="pic.jpg" alt=""
           onload="this.parentElement.style.display=''"
           onerror="this.parentElement.style.display='none'" />
    </div>
  </div>

  <div id="floor-edge"></div>

  <div id="table">
    <span class="zone-label">your desk</span>
    <svg class="desk-obj" id="desk-mug" viewBox="0 0 44 48" width="132" height="144">
      <path d="M13 8 Q11 4 13 1" stroke="#c8a878" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>
      <path d="M18 7 Q16 3 18 0" stroke="#c8a878" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5"/>
      <rect x="4" y="12" width="26" height="28" rx="3" fill="#8b4513"/>
      <rect x="6" y="14" width="22" height="24" rx="2" fill="#a0522d"/>
      <rect x="4" y="12" width="26" height="4" rx="2" fill="#6b3410"/>
      <path d="M30 18 Q40 18 40 26 Q40 34 30 34" stroke="#6b3410" stroke-width="3" fill="none" stroke-linecap="round"/>
      <ellipse cx="17" cy="16" rx="11" ry="3" fill="#3d1c02"/>
      <rect x="2" y="38" width="30" height="4" rx="2" fill="#5a2d0c"/>
    </svg>
    <div id="widgets-container"></div>
  </div>

  <div id="basket">
    <div id="basket-handle"></div>
    <p class="basket-title">basket</p>
    <button onclick="spawnPomodoro()">pomodoro</button>
    <button onclick="spawnNote()">note</button>
    <button onclick="spawnClock()">clock</button>
    <button onclick="spawnMusic()">music</button>
    <hr class="basket-divider" />
    <button onclick="clearTable()">clear</button>
  </div>

  <script src="javascript/pomodoro.js"></script>
  <script src="javascript/notes.js"></script>
  <script src="javascript/clock.js"></script>
  <script src="javascript/music.js"></script>
</body>
</html>
